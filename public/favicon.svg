<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="125" fill="#DC2626" stroke="#1F2937" stroke-width="2"/>
  
  <!-- Wrench icon -->
  <g transform="translate(128, 128)">
    <!-- Main wrench body -->
    <path d="M -45 -15 Q -35 -25 -20 -25 Q -5 -25 5 -15 L 35 15 Q 45 25 45 40 Q 45 50 35 60 L -15 60 Q -25 50 -25 40 Q -25 25 -15 15 L -45 -15 Z" fill="white" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Wrench head (adjustable part) -->
    <circle cx="35" cy="50" r="12" fill="white" stroke="white" stroke-width="1.5"/>
    <path d="M 28 50 L 42 50 M 35 43 L 35 57" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Highlight for dimension -->
    <ellipse cx="-25" cy="-18" rx="8" ry="6" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Text indicator "PM" -->
  <text x="128" y="210" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-2">PM</text>
</svg>
